groups:
  - name: application_alerts
    rules:
      - alert: HighHeapUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "JVM Heap 사용량이 85%를 초과했습니다"
          description: "Instance {{ $labels.instance }} JVM Heap 사용률: {{ $value | humanizePercentage }}"

      - alert: HighHttpErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HTTP 5xx 오류율이 5%를 초과했습니다"
          description: "Instance {{ $labels.instance }} 오류율: {{ $value | humanizePercentage }}"

      - alert: SlowHttpRequests
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP p95 응답 시간이 2초를 초과했습니다"
          description: "Instance {{ $labels.instance }} p95 응답 시간: {{ $value }}s"

  - name: mysql_alerts
    rules:
      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MySQL slow query 빈도가 높습니다"
          description: "Slow query 비율: {{ $value }}/s"

      - alert: MySQLHighConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL 연결 수가 최대치의 80%를 초과했습니다"
          description: "연결 사용률: {{ $value | humanizePercentage }}"

  - name: redis_alerts
    rules:
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 메모리 사용량이 85%를 초과했습니다"
          description: "Redis 메모리 사용률: {{ $value | humanizePercentage }}"

      - alert: RedisKeyEviction
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 키 eviction이 빠르게 발생하고 있습니다"
          description: "Eviction 비율: {{ $value }}/s"

  - name: system_alerts
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 사용률이 80%를 초과했습니다"
          description: "Instance {{ $labels.instance }} CPU 사용률: {{ $value }}%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "메모리 사용률이 85%를 초과했습니다"
          description: "Instance {{ $labels.instance }} 메모리 사용률: {{ $value | humanizePercentage }}"
