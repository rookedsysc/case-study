spring:
  application:
    name: case-study

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:casestudy}
    username: ${MYSQL_USER:appuser}
    password: ${MYSQL_PASSWORD:apppassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 인스턴스 3개 기준 총 60 connection (MySQL default max_connections: 151 이하로 유지)
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # saveAll() 호출 시 단일 multi-row INSERT로 처리해 bulk 생성 속도를 높인다
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
      otlp:
        enabled: true
        url: http://${OTEL_COLLECTOR_HOST:otel-collector}:4318/v1/metrics
        step: 10s
    tags:
      application: ${spring.application.name}
      instance: ${HOSTNAME:unknown}
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: http://${OTEL_COLLECTOR_HOST:otel-collector}:4318
      protocol: http/protobuf
  logs:
    exporter: otlp

logging:
  level:
    root: INFO

  tomcat:
    # 인스턴스 3개 기준 총 1200 스레드 → 1000 VU 동시 요청 수용
    threads:
      max: 400
      min-spare: 50
    accept-count: 200
