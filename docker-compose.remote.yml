services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    environment:
      - APP_PORT=${APP_PORT:-8080}
    volumes:
      - ./nginx/nginx-global.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - nginx-logs:/var/log/nginx
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    sysctls:
      net.core.somaxconn: 16384
    depends_on:
      app:
        condition: service_healthy

  app:
    build: ./kotlin-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - APP_PORT=${APP_PORT:-8080}
      - JAVA_OPTS=-XX:+UseG1GC -Xms384m -Xmx512m -XX:ActiveProcessorCount=1 -XX:MaxDirectMemorySize=128m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp -Xlog:gc*:stdout:time,uptime,level,tags
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_SOURCE_HOST=${MYSQL_SOURCE_HOST}
      - MYSQL_SOURCE_PORT=${MYSQL_SOURCE_PORT}
      - MYSQL_WRITE_HOST=${MYSQL_WRITE_HOST}
      - MYSQL_WRITE_PORT=${MYSQL_WRITE_PORT}
      - MYSQL_READ_HOST=${MYSQL_READ_HOST}
      - MYSQL_READ_PORT=${MYSQL_READ_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - FLYWAY_HOST=${FLYWAY_HOST}
      - FLYWAY_PORT=${FLYWAY_PORT}
      - MYSQL_SOURCE_ONLY=${MYSQL_SOURCE_ONLY:-true}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST}
      - OTEL_COLLECTOR_PORT=${OTEL_COLLECTOR_PORT}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - OTEL_LOGS_EXPORTER=${OTEL_LOGS_EXPORTER:-otlp}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-case-study}
      - MANAGEMENT_TRACING_SAMPLING_PROBABILITY=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-0.1}
      - SERVER_TOMCAT_THREADS_MAX=${SERVER_TOMCAT_THREADS_MAX:-64}
      - SERVER_TOMCAT_THREADS_MIN_SPARE=${SERVER_TOMCAT_THREADS_MIN_SPARE:-10}
      - SERVER_TOMCAT_ACCEPT_COUNT=${SERVER_TOMCAT_ACCEPT_COUNT:-100}
      - SPRING_DATASOURCE_SOURCE_MAXIMUM_POOL_SIZE=${SPRING_DATASOURCE_SOURCE_MAXIMUM_POOL_SIZE:-6}
      - SPRING_DATASOURCE_SOURCE_MINIMUM_IDLE=${SPRING_DATASOURCE_SOURCE_MINIMUM_IDLE:-2}
      - SPRING_DATASOURCE_WRITE_MAXIMUM_POOL_SIZE=${SPRING_DATASOURCE_WRITE_MAXIMUM_POOL_SIZE:-6}
      - SPRING_DATASOURCE_WRITE_MINIMUM_IDLE=${SPRING_DATASOURCE_WRITE_MINIMUM_IDLE:-2}
      - SPRING_DATASOURCE_READ_MAXIMUM_POOL_SIZE=${SPRING_DATASOURCE_READ_MAXIMUM_POOL_SIZE:-6}
      - SPRING_DATASOURCE_READ_MINIMUM_IDLE=${SPRING_DATASOURCE_READ_MINIMUM_IDLE:-2}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  nginx-logs:
