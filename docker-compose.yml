services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-1:
        condition: service_started
      app-2:
        condition: service_started
      app-3:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-1:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=case-study
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-2:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=case-study
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-3:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=case-study
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  mysql:
    image: mysql:8.4.8
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis:
    image: redis:8.6-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-1:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7001:6379"
    volumes:
      - redis-cluster-node-1-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-2:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7002:6379"
    volumes:
      - redis-cluster-node-2-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-3:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7003:6379"
    volumes:
      - redis-cluster-node-3-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-init:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        if redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-1 -p 6379 cluster info | grep -q "cluster_state:ok"; then
          exit 0
        fi
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-1 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-2 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-3 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        yes yes | redis-cli --cluster create \
          redis-cluster-node-1:6379 \
          redis-cluster-node-2:6379 \
          redis-cluster-node-3:6379 \
          --cluster-replicas 0 \
          -a ${REDIS_PASSWORD:-redispassword}
    depends_on:
      redis-cluster-node-1:
        condition: service_started
      redis-cluster-node-2:
        condition: service_started
      redis-cluster-node-3:
        condition: service_started

  redis-cluster-proxy:
    image: kornrunner/redis-cluster-proxy:latest
    platform: linux/amd64
    command:
      - --port
      - "7777"
      - --auth
      - ${REDIS_PASSWORD:-redispassword}
      - redis-cluster-node-1:6379,redis-cluster-node-2:6379,redis-cluster-node-3:6379
    ports:
      - "7777:7777"
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  loki:
    image: grafana/loki:3.4.1
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    ports:
      - "${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${OTEL_PROMETHEUS_HOST_PORT:-8889}:8889"
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    environment:
      - MYSQLD_EXPORTER_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    ports:
      - "${MYSQLD_EXPORTER_HOST_PORT:-9104}:9104"
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
    ports:
      - "${REDIS_EXPORTER_HOST_PORT:-9121}:9121"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M

volumes:
  mysql-data:
  redis-data:
  redis-cluster-node-1-data:
  redis-cluster-node-2-data:
  redis-cluster-node-3-data:
  grafana-data:
  prometheus-data:
  loki-data:
