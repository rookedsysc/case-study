services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-1:
        condition: service_started
      app-2:
        condition: service_started
      app-3:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-1:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-2:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  app-3:
    build: ./kotlin-server
    expose:
      - "${APP_PORT:-8080}"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  mysql:
    image: mysql:8.4.8
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-casestudy}
      - MYSQL_USER=${MYSQL_USER:-appuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-apppassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis:
    image: redis:8.6-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-1:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7001:6379"
    volumes:
      - redis-cluster-node-1-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-2:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7002:6379"
    volumes:
      - redis-cluster-node-2-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-node-3:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        exec redis-server \
          --port 6379 \
          --requirepass ${REDIS_PASSWORD:-redispassword} \
          --masterauth ${REDIS_PASSWORD:-redispassword} \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --protected-mode no
    ports:
      - "7003:6379"
    volumes:
      - redis-cluster-node-3-data:/data
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  redis-cluster-init:
    image: redis:8.6-alpine
    command:
      - sh
      - -c
      - |
        if redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-1 -p 6379 cluster info | grep -q "cluster_state:ok"; then
          exit 0
        fi
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-1 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-2 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        until redis-cli -a ${REDIS_PASSWORD:-redispassword} -h redis-cluster-node-3 -p 6379 ping >/dev/null 2>&1; do sleep 1; done
        yes yes | redis-cli --cluster create \
          redis-cluster-node-1:6379 \
          redis-cluster-node-2:6379 \
          redis-cluster-node-3:6379 \
          --cluster-replicas 0 \
          -a ${REDIS_PASSWORD:-redispassword}
    depends_on:
      redis-cluster-node-1:
        condition: service_started
      redis-cluster-node-2:
        condition: service_started
      redis-cluster-node-3:
        condition: service_started

  redis-cluster-proxy:
    image: kornrunner/redis-cluster-proxy:latest
    platform: linux/amd64
    command:
      - --port
      - "7777"
      - --auth
      - ${REDIS_PASSWORD:-redispassword}
      - redis-cluster-node-1:6379,redis-cluster-node-2:6379,redis-cluster-node-3:6379
    ports:
      - "7777:7777"
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully

volumes:
  mysql-data:
  redis-data:
  redis-cluster-node-1-data:
  redis-cluster-node-2-data:
  redis-cluster-node-3-data:
